name: AI Code Review

# Triggered on every PR (opened, updated, re-opened) to any branch.
# Requires one repository secret:  OPENAI_API_KEY
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write  # needed to post the review comment

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true  # new push cancels the in-progress review

jobs:
  codex-review:
    name: Codex Code Review
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for accurate diff

      - name: Extract PR diff (source files only)
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD \
            -- '*.py' '*.ts' '*.tsx' '*.js' '*.jsx' \
               '*.yml' '*.yaml' '*.json' '*.sql' \
            ':!frontend/package-lock.json' \
            ':!frontend/node_modules/**' \
            ':!backend/.venv/**' \
            ':!**/__pycache__/**' \
            > /tmp/pr_diff.txt
          SIZE=$(wc -c < /tmp/pr_diff.txt)
          echo "bytes=$SIZE" >> $GITHUB_OUTPUT
          echo "Diff size: $SIZE bytes"

      - name: Skip review if diff is empty
        if: steps.diff.outputs.bytes == '0'
        run: |
          echo "No reviewable changes in this PR. Skipping AI review."
          exit 0

      - name: Setup Python
        if: steps.diff.outputs.bytes != '0'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OpenAI SDK
        if: steps.diff.outputs.bytes != '0'
        run: pip install --quiet openai

      - name: Run Codex Review and post comment
        if: steps.diff.outputs.bytes != '0'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:      ${{ github.event.pull_request.number }}
          PR_TITLE:       ${{ github.event.pull_request.title }}
          REPO:           ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, sys, json
          import urllib.request
          from openai import OpenAI

          diff = open("/tmp/pr_diff.txt", encoding="utf-8", errors="replace").read().strip()
          if not diff:
              print("Empty diff — nothing to review.")
              sys.exit(0)

          # Guard against extremely large diffs (> 80 KB → truncate)
          MAX_CHARS = 80_000
          truncated = False
          if len(diff) > MAX_CHARS:
              diff = diff[:MAX_CHARS]
              truncated = True

          client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])

          system_prompt = """You are a senior code reviewer for a private family knowledge vault.
Stack: FastAPI + SQLAlchemy (SQLite) + Qdrant vector DB + Celery + Next.js 14 (TypeScript).
Key services: AI agent pipeline (planner.py → agent.py), bill fact extraction, NAS/mail ingestion.

Review the provided git diff. Focus only on issues that matter:
1. 🔒 **Security** — SQL injection, exposed secrets, unsafe deserialization, auth bypass
2. 🐛 **Bugs** — incorrect logic, wrong return values, unhandled edge cases
3. ⚡ **Performance** — N+1 DB queries, large allocations in hot paths, missing indices
4. 🏗️ **Architecture** — breaking API changes, tight coupling, missing rollback/cleanup
5. ✅ **Correctness** — type mismatches, off-by-one, regex edge cases, async hazards

Format rules:
- Use severity tags: **[CRITICAL]**, **[HIGH]**, **[MEDIUM]**, **[LOW]**, **[INFO]**
- Reference file + line number when possible: `agent.py:1234`
- If no issues found, say so in one sentence — do NOT invent problems
- Skip pure style/formatting comments unless they affect readability critically
- Keep total response under 1500 words"""

          pr_title = os.environ.get("PR_TITLE", "")
          user_content = f"PR: {pr_title}\n\n"
          if truncated:
              user_content += "_Note: diff was truncated to 80 KB due to size._\n\n"
          user_content += f"```diff\n{diff}\n```"

          response = client.chat.completions.create(
              model="gpt-4o",
              temperature=0.1,
              max_tokens=2000,
              messages=[
                  {"role": "system", "content": system_prompt},
                  {"role": "user",   "content": user_content},
              ],
          )

          review_text = response.choices[0].message.content.strip()
          usage = response.usage
          print(f"Tokens used: prompt={usage.prompt_tokens} completion={usage.completion_tokens}")

          # Build the PR comment body
          trunc_note = "\n> ⚠️ _Diff was truncated to 80 KB. Some files may not be reviewed._" if truncated else ""
          comment_body = (
              f"## 🤖 AI Code Review\n{trunc_note}\n\n"
              f"{review_text}\n\n"
              f"---\n"
              f"<sub>Model: gpt-4o · "
              f"Tokens: {usage.prompt_tokens}↑ {usage.completion_tokens}↓</sub>"
          )

          # Post comment to PR via GitHub REST API
          token = os.environ["GITHUB_TOKEN"]
          repo  = os.environ["REPO"]
          pr    = os.environ["PR_NUMBER"]
          url   = f"https://api.github.com/repos/{repo}/issues/{pr}/comments"

          payload = json.dumps({"body": comment_body}).encode("utf-8")
          req = urllib.request.Request(
              url, data=payload,
              headers={
                  "Authorization":  f"Bearer {token}",
                  "Content-Type":   "application/json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="POST",
          )
          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read())
              print(f"Review comment posted: {result.get('html_url')}")
          PYEOF
