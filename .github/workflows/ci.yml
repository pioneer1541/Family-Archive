name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel in-flight runs for the same branch/PR when a new commit arrives
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: lint + unit tests ───────────────────────────────────────────
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps (tesseract)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends tesseract-ocr tesseract-ocr-eng

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check app

      - name: Test (pytest)
        env:
          FAMILY_VAULT_JWT_SECRET: ci-test-secret-not-used-in-prod
        run: pytest -q

  # ── Frontend: unit tests + type-check + build ────────────────────────────
  frontend:
    name: Frontend (unit + type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Unit tests (vitest)
        run: npm test

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Build (next)
        run: npm run build
