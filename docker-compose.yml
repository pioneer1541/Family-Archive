services:
  fkv-api:
    build: ./backend
    container_name: fkv-api
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      - FAMILY_VAULT_CELERY_TASK_ALWAYS_EAGER=0
      - FAMILY_VAULT_INGESTION_RETRY_MAX_RETRIES=2
      - FAMILY_VAULT_INGESTION_RETRY_BASE_DELAY_SEC=5
      - FAMILY_VAULT_DATABASE_URL=sqlite:////app/data/family_vault.db
      - FAMILY_VAULT_REDIS_URL=redis://redis:6379/0
      - FAMILY_VAULT_QDRANT_URL=http://qdrant:6333
      - FAMILY_VAULT_QDRANT_COLLECTION=fkv_docs_v1
      - FAMILY_VAULT_QDRANT_ENABLE=1
      - FAMILY_VAULT_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - FAMILY_VAULT_SUMMARY_MODEL=lfm2:latest
      - FAMILY_VAULT_CATEGORY_MODEL=qwen3:4b-instruct
      - FAMILY_VAULT_FRIENDLY_NAME_MODEL=lfm2:latest
      - FAMILY_VAULT_SUMMARY_TIMEOUT_PAGE_SEC=90
      - FAMILY_VAULT_SUMMARY_TIMEOUT_SECTION_SEC=120
      - FAMILY_VAULT_SUMMARY_TIMEOUT_FINAL_SEC=120
      - FAMILY_VAULT_SUMMARY_TIMEOUT_NAME_SEC=60
      - FAMILY_VAULT_SUMMARY_TIMEOUT_CATEGORY_SEC=60
      - FAMILY_VAULT_SQLITE_BUSY_TIMEOUT_MS=30000
      - FAMILY_VAULT_NAS_DEFAULT_SOURCE_DIR=/volume1/Family_Archives
      - FAMILY_VAULT_NAS_SCAN_INTERVAL_SEC=1800
      - FAMILY_VAULT_MAIL_CREDENTIALS_PATH=/app/secrets/gmail/credentials.json
      - FAMILY_VAULT_MAIL_TOKEN_PATH=/app/secrets/gmail/token.json
      - FAMILY_VAULT_MAIL_ATTACHMENT_ROOT=/app/data/mail_attachments
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "18080"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./secrets/gmail:/app/secrets/gmail:ro
      # Uncomment and adjust the lines below to mount a local NAS/directory:
      # - /mnt/nas:/mnt/nas:ro
      # - /mnt/nas:/volume1/Family_Archives
    ports:
      - "18180:18080"
    depends_on:
      - redis
      - qdrant

  fkv-worker:
    build: ./backend
    container_name: fkv-worker
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      - FAMILY_VAULT_CELERY_TASK_ALWAYS_EAGER=0
      - FAMILY_VAULT_INGESTION_RETRY_MAX_RETRIES=2
      - FAMILY_VAULT_INGESTION_RETRY_BASE_DELAY_SEC=5
      - FAMILY_VAULT_DATABASE_URL=sqlite:////app/data/family_vault.db
      - FAMILY_VAULT_REDIS_URL=redis://redis:6379/0
      - FAMILY_VAULT_QDRANT_URL=http://qdrant:6333
      - FAMILY_VAULT_QDRANT_COLLECTION=fkv_docs_v1
      - FAMILY_VAULT_QDRANT_ENABLE=1
      - FAMILY_VAULT_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - FAMILY_VAULT_SUMMARY_MODEL=lfm2:latest
      - FAMILY_VAULT_CATEGORY_MODEL=qwen3:4b-instruct
      - FAMILY_VAULT_FRIENDLY_NAME_MODEL=lfm2:latest
      - FAMILY_VAULT_SUMMARY_TIMEOUT_PAGE_SEC=90
      - FAMILY_VAULT_SUMMARY_TIMEOUT_SECTION_SEC=120
      - FAMILY_VAULT_SUMMARY_TIMEOUT_FINAL_SEC=120
      - FAMILY_VAULT_SUMMARY_TIMEOUT_NAME_SEC=60
      - FAMILY_VAULT_SUMMARY_TIMEOUT_CATEGORY_SEC=60
      - FAMILY_VAULT_SQLITE_BUSY_TIMEOUT_MS=30000
      - FAMILY_VAULT_NAS_DEFAULT_SOURCE_DIR=/volume1/Family_Archives
      - FAMILY_VAULT_MAIL_CREDENTIALS_PATH=/app/secrets/gmail/credentials.json
      - FAMILY_VAULT_MAIL_TOKEN_PATH=/app/secrets/gmail/token.json
      - FAMILY_VAULT_MAIL_ATTACHMENT_ROOT=/app/data/mail_attachments
      - FAMILY_VAULT_CELERY_WORKER_CONCURRENCY=2
    command:
      [
        "sh",
        "-c",
        "celery -A app.worker worker --loglevel=info --concurrency=${FAMILY_VAULT_CELERY_WORKER_CONCURRENCY:-2} --prefetch-multiplier=1",
      ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./secrets/gmail:/app/secrets/gmail:ro
      # Uncomment and adjust the lines below to mount a local NAS/directory:
      # - /mnt/nas:/mnt/nas:ro
      # - /mnt/nas:/volume1/Family_Archives:ro
    depends_on:
      - redis
      - qdrant

  redis:
    image: redis:7-alpine
    container_name: fkv-redis
    restart: unless-stopped
    ports:
      - "16379:6379"

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: fkv-qdrant
    restart: unless-stopped
    ports:
      - "16333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage

  fkv-frontend:
    image: mcr.microsoft.com/playwright:v1.50.0-jammy
    container_name: fkv-frontend
    working_dir: /app
    command: ["sh", "-c", "npm install && npm run dev"]
    environment:
      - NEXT_PUBLIC_FKV_API_BASE=/api
      - FKV_INTERNAL_API_BASE=http://fkv-api:18080
      - NEXT_DIST_DIR=.next-runtime
    volumes:
      - ./frontend:/app
    ports:
      - "18181:18081"
    depends_on:
      - fkv-api
